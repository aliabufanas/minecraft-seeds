<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Seeds Hub</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    transition: 0.3s;
    background: #f4f4f4;
    color: #111;
}

header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
}

button {
    cursor: pointer;
}

#toggle {
    position: absolute;
    left: 10px;
    top: 10px;
    padding: 8px;
}

.container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 15px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

.seed {
    font-weight: bold;
    color: #27ae60;
    word-break: break-all;
}

.dark {
    background: #111;
    color: white;
}

.dark .card {
    background: #1e1e1e;
    color: white;
}
</style>
</head>

<body>

<header>
    <button id="toggle" onclick="toggleMode()">🌙/☀️</button>
    <h1>🔥 Minecraft Seeds Hub</h1>
    <p>أفضل موقع Seeds ماين كرافت مع شرح ونسخ سريع</p>
</header>

<div class="container" id="seedsContainer"></div>

function load(){
    const c = document.getElementById("seedsContainer");
    seeds.forEach(s=>{
        const div=document.createElement("div");
        div.className="card";
        div.innerHTML=`
        <div class="seed">${s.seed}</div>
        <p>${s.desc}</p>
        <button onclick="navigator.clipboard.writeText('${s.seed}')">
        📋 نسخ Seed
        </button>
        `;
        c.appendChild(div);
    });
}

function toggleMode(){
    document.body.classList.toggle("dark");
}

load();
</script>

</html>
